<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:inline="javascript" lang="">

<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-text text-white">

            <b th:text="${#authentication.name}"></b>

            with roles:

            <span th:each="role : ${#authentication.authorities}"
                  th:text="${role.authority} + ' '">
            </span>

        </span>

        <form th:action="@{/logout}" method="post">

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>

            <button class="btn btn-outline-light">
                Logout
            </button>

        </form>

    </div>

</nav>


<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 bg-light vh-100 p-3">
            <ul class="nav flex-column">
                <li class="nav-item mb-2">
                    <a class="nav-link active"
                       th:href="@{/admin}">
                        Admin
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/user}">
                        User
                    </a>
                </li>
            </ul>
        </div>

        <div class="col-md-10 p-4">
            <h2>Admin panel</h2>
            <ul class="nav nav-tabs mb-4">
                <li class="nav-item">
                    <button class="nav-link active"
                            data-bs-toggle="tab"
                            data-bs-target="#usersTable">
                        Users table
                    </button>
                </li>

                <li class="nav-item">
                    <button class="nav-link"
                            data-bs-toggle="tab"
                            data-bs-target="#newUser">
                        New user
                    </button>
                </li>
            </ul>


            <div class="tab-content">
                <div class="tab-pane fade show active"
                     id="usersTable">
                    <table class="table table-striped">
                        <thead>
                        <tr>

                            <th>ID</th>
                            <th>Username</th>
                            <th>First name</th>
                            <th>Last name</th>
                            <th>Age</th>
                            <th>Email</th>
                            <th>Roles</th>
                            <th>Edit</th>
                            <th>Delete</th>

                        </tr>
                        </thead>
                        <tbody>

                        <tr th:each="user : ${users}">

                            <td th:text="${user.id}"></td>
                            <td th:text="${user.username}"></td>
                            <td th:text="${user.firstName}"></td>
                            <td th:text="${user.lastName}"></td>
                            <td th:text="${user.age}"></td>
                            <td th:text="${user.email}"></td>

                            <td>

                                <span th:each="role : ${user.roles}"
                                      th:text="${role.name} + ' '">
                                </span>

                            </td>

                            <td>

                                <button class="btn btn-primary btn-sm"
                                        data-bs-toggle="modal"
                                        data-bs-target="#editModal"

                                        th:attr="data-id=${user.id},
                                                 data-username=${user.username},
                                                 data-firstname=${user.firstName},
                                                 data-lastname=${user.lastName},
                                                 data-age=${user.age},
                                                 data-email=${user.email},
                                                 data-roles=${user.roleIds}"
                                        onclick="fillEditModal(this)">
                                    Edit
                                </button>


                            </td>

                            <td>
                                <button class="btn btn-danger btn-sm"
                                        data-bs-toggle="modal"
                                        data-bs-target="#deleteModal"
                                        th:attr="data-id=${user.id},
                                                 data-username=${user.username},
                                                 data-firstname=${user.firstName},
                                                 data-lastname=${user.lastName},
                                                 data-age=${user.age},
                                                 data-email=${user.email},
                                                 data-roles=${user.rolesNames}"
                                        onclick="fillDeleteModal(this)">
                                    Delete
                                </button>
                            </td>
                        </tr>

                        </tbody>

                    </table>

                </div>


                <div class="tab-pane fade" id="newUser">

                    <div class="container mt-4" style="max-width:700px">

                        <h4 class="text-center mb-4">Add User</h4>

                        <div th:if="${errorMessage}" class="alert alert-danger">
                            <p th:text="${errorMessage}"></p>
                        </div>

                        <form th:action="@{/admin/newUser}" th:object="${newUser}" method="post">

                            <input type="hidden" th:field="*{id}" />

                            <div class="mb-3 row">
                                <label class="col-sm-3 col-form-label">Roles</label>
                                <div class="col-sm-9">
                                    <div th:each="role : ${roles}" class="form-check">
                                        <input class="form-check-input"
                                               type="checkbox"
                                               th:field="*{roles}"
                                               th:value="${role.id}">
                                        <label class="form-check-label"
                                               th:text="${role.name}">
                                        </label>
                                    </div>

                                    <div class="text-danger"
                                         th:if="${#fields.hasErrors('roles')}"
                                         th:errors="*{roles}">
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3 row align-items-center">
                                <label for="newUsername" class="col-sm-3 col-form-label">Username</label>
                                <div class="col-sm-9">
                                    <input type="text"
                                           class="form-control"
                                           id="newUsername"
                                           th:field="*{username}"
                                           required>
                                    <div class="text-danger"
                                         th:if="${#fields.hasErrors('username')}"
                                         th:errors="*{username}">
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3 row align-items-center">
                                <label for="newFirstName" class="col-sm-3 col-form-label">First name</label>
                                <div class="col-sm-9">
                                    <input type="text"
                                           class="form-control"
                                           id="newFirstName"
                                           th:field="*{firstName}"
                                           required>
                                    <div class="text-danger"
                                         th:if="${#fields.hasErrors('firstName')}"
                                         th:errors="*{firstName}">
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3 row align-items-center">
                                <label for="newLastName" class="col-sm-3 col-form-label">Last name</label>
                                <div class="col-sm-9">
                                    <input type="text"
                                           class="form-control"
                                           id="newLastName"
                                           th:field="*{lastName}"
                                           required>
                                    <div class="text-danger"
                                         th:if="${#fields.hasErrors('lastName')}"
                                         th:errors="*{lastName}">
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3 row align-items-center">
                                <label for="newAge" class="col-sm-3 col-form-label">Age</label>
                                <div class="col-sm-9">
                                    <input type="number"
                                           class="form-control"
                                           id="newAge"
                                           th:field="*{age}"
                                           required>
                                    <div class="text-danger"
                                         th:if="${#fields.hasErrors('age')}"
                                         th:errors="*{age}">
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3 row align-items-center">
                                <label for="newEmail" class="col-sm-3 col-form-label">Email</label>
                                <div class="col-sm-9">
                                    <input type="text"
                                           class="form-control"
                                           id="newEmail"
                                           th:field="*{email}"
                                           required>
                                    <div class="text-danger"
                                         th:if="${#fields.hasErrors('email')}"
                                         th:errors="*{email}">
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3 row align-items-center">
                                <label for="newPassword" class="col-sm-3 col-form-label">Password</label>
                                <div class="col-sm-9">
                                    <input type="password"
                                           class="form-control"
                                           id="newPassword"
                                           th:field="*{password}"
                                           required>
                                    <div class="text-danger"
                                         th:if="${#fields.hasErrors('password')}"
                                         th:errors="*{password}">
                                    </div>
                                </div>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit"
                                        class="btn btn-primary">
                                    Create user
                                </button>
                            </div>
                        </form>
                    </div>
                </div>


                <div class="modal fade" id="editModal" tabindex="-1">

                    <div class="modal-dialog">

                        <div class="modal-content">

                            <div class="modal-header">

                                <h5 class="modal-title">
                                    Edit user
                                </h5>

                                <button class="btn-close" data-bs-dismiss="modal">
                                </button>

                            </div>

                            <form th:action="@{/admin/edit}" th:object="${editUser}" method="post">

                                <div class="modal-body">

                                    <div class="mb-3 row align-items-center">
                                        <label for="editIdVisible" class="col-sm-3 col-form-label">ID</label>
                                        <div class ="col-sm-9">
                                            <input class="form-control" id="editIdVisible" th:value="*{id}" disabled>
                                        </div>
                                    </div>

                                    <input type="hidden" th:field="*{id}" id="editId">

                                    <div class="mb-3 row align-items-center">
                                        <label class="col-sm-3 col-form-label">Roles</label>
                                        <div class="col-sm-9">
                                            <div th:each="role : ${roles}" class="form-check">
                                                <input class="form-check-input role-checkbox" type="checkbox"
                                                       th:field="*{roles}" th:value="${role.id}">
                                                <label class="form-check-label" th:text="${role.name}"></label>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="mb-3 row align-items-center">

                                        <label for="editUsername" class="col-sm-3 col-form-label">Username</label>

                                        <div class="col-sm-9">
                                            <input class="form-control" id="editUsername" th:field="*{username}">
                                            <div class="text-danger"
                                                 th:if="${#fields.hasErrors('username')}"
                                                 th:errors="*{username}">
                                            </div>
                                        </div>
                                    </div>

                                    <div class="mb-3 row align-items-center">

                                        <label for="editFirstName" class="col-sm-3 col-form-label">
                                            First name
                                        </label>

                                        <div class="col-sm-9">
                                            <input class="form-control" id="editFirstName" th:field="*{firstName}">
                                            <div class="text-danger"
                                                 th:if="${#fields.hasErrors('firstName')}"
                                                 th:errors="*{firstName}">
                                            </div>
                                        </div>

                                    </div>

                                    <div class="mb-3 row align-items-center">

                                        <label for="editLastName" class="col-sm-3 col-form-label">Last name</label>

                                        <div class="col-sm-9">
                                            <input class="form-control" id="editLastName" th:field="*{lastName}">
                                            <div class="text-danger"
                                                 th:if="${#fields.hasErrors('lastName')}"
                                                 th:errors="*{lastName}">
                                            </div>
                                        </div>
                                    </div>

                                    <div class="mb-3 row align-items-center">

                                        <label for="editAge" class="col-sm-3 col-form-label">Age</label>

                                        <div class="col-sm-9">
                                            <input type="number" class="form-control" id="editAge" th:field="*{age}">

                                            <div class="text-danger"
                                                 th:if="${#fields.hasErrors('age')}"
                                                 th:errors="*{age}">
                                            </div>
                                        </div>

                                    </div>

                                    <div class="mb-3 row align-items-center">

                                        <label for="editEmail" class="col-sm-3 col-form-label">Email</label>
                                        <div class="col-sm-9">
                                            <input class="form-control" id="editEmail" th:field="*{email}">
                                            <div class="text-danger"
                                                 th:if="${#fields.hasErrors('email')}"
                                                 th:errors="*{email}">
                                            </div>
                                        </div>

                                    </div>

                                    <div class="mb-3 row align-items-center" >
                                        <label class="col-sm-3 col-form-label">Password</label>

                                        <div class="col-sm-9">
                                            <input type="password"
                                                   class="form-control"
                                                   th:field="*{password}"
                                                   placeholder="Leave empty if you don't want to change">
                                            <div class="text-danger"
                                                 th:if="${#fields.hasErrors('password')}"
                                                 th:errors="*{password}">
                                            </div>
                                        </div>

                                    </div>
                                </div>

                                <div class="modal-footer">

                                    <button class="btn btn-secondary"
                                            data-bs-dismiss="modal"
                                            type="button">
                                        Close
                                    </button>

                                    <button class="btn btn-primary"
                                            type="submit">
                                        Save
                                    </button>

                                </div>

                            </form>

                        </div>

                    </div>

                </div>


                <div class="modal fade" id="deleteModal" tabindex="-1">
                    <div class="modal-dialog modal-lg">
                        <div class="modal-content">

                            <div class="modal-header">
                                <h5 class="modal-title">Delete user</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>

                            <form th:action="@{/admin/delete}" method="post">
                                <div class="modal-body">

                                    <input type="hidden" name="id" id="deleteId">

                                    <input type="hidden"
                                           th:name="${_csrf.parameterName}"
                                           th:value="${_csrf.token}" />

                                    <div class="mb-3 row align-items-center">
                                        <label for="deleteIdVisible" class="col-sm-3 col-form-label">ID</label>
                                        <div class="col-sm-9">
                                            <input class="form-control" id="deleteIdVisible" disabled>
                                        </div>
                                    </div>

                                    <div class="mb-3 row align-items-center">
                                        <label for="deleteUsername" class="col-sm-3 col-form-label">Username</label>
                                        <div class="col-sm-9">
                                            <input class="form-control" id="deleteUsername" disabled>
                                        </div>
                                    </div>

                                    <div class="mb-3 row align-items-center">
                                        <label for="deleteFirstName" class="col-sm-3 col-form-label">First name</label>
                                        <div class="col-sm-9">
                                            <input class="form-control" id="deleteFirstName" disabled>
                                        </div>
                                    </div>

                                    <div class="mb-3 row align-items-center">
                                        <label for="deleteLastName" class="col-sm-3 col-form-label">Last name</label>
                                        <div class="col-sm-9">
                                            <input class="form-control" id="deleteLastName" disabled>
                                        </div>
                                    </div>

                                    <div class="mb-3 row align-items-center">
                                        <label for="deleteAge" class="col-sm-3 col-form-label">Age</label>
                                        <div class="col-sm-9">
                                            <input class="form-control" id="deleteAge" disabled>
                                        </div>
                                    </div>

                                    <div class="mb-3 row align-items-center">
                                        <label for="deleteEmail" class="col-sm-3 col-form-label">Email</label>
                                        <div class="col-sm-9">
                                            <input class="form-control" id="deleteEmail" disabled>
                                        </div>
                                    </div>

                                    <div class="mb-3 row align-items-center">
                                        <label for="deleteRoles" class="col-sm-3 col-form-label">Roles</label>
                                        <div class="col-sm-9">
                                            <input class="form-control" id="deleteRoles" disabled>
                                        </div>
                                    </div>

                                </div>

                                <div class="modal-footer">
                                    <button class="btn btn-secondary" type="button" data-bs-dismiss="modal">
                                        Close
                                    </button>
                                    <button class="btn btn-danger" type="submit">
                                        Delete
                                    </button>
                                </div>
                            </form>

                        </div>
                    </div>
                </div>



            </div>
        </div>
    </div>
</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function fillEditModal(button) {
        const userId = button.getAttribute('data-id');

        document.getElementById('editIdVisible').value = userId;
        document.getElementById('editId').value = userId;

        document.getElementById('editUsername').value =
            button.getAttribute('data-username');

        document.getElementById('editFirstName').value =
            button.getAttribute('data-firstname');

        document.getElementById('editLastName').value =
            button.getAttribute('data-lastname');

        document.getElementById('editAge').value =
            button.getAttribute('data-age');

        document.getElementById('editEmail').value =
            button.getAttribute('data-email');

        const rolesString = button.getAttribute('data-roles');

        const selectedRoles = rolesString ? rolesString.split(',') : [];

        document.querySelectorAll('.role-checkbox').forEach(cb => {
            cb.checked = false;
        });

        selectedRoles.forEach(roleId => {
            const checkbox = document.querySelector(
                '.role-checkbox[value="' + roleId + '"]'
            );
            if (checkbox) checkbox.checked = true;
        });
    }
</script>

<script>
    function fillDeleteModal(button) {
        document.getElementById('deleteIdVisible').value =
            button.getAttribute('data-id');

        document.getElementById('deleteId').value =
            button.getAttribute('data-id');

        document.getElementById('deleteUsername').value =
            button.getAttribute('data-username');

        document.getElementById('deleteFirstName').value =
            button.getAttribute('data-firstname');

        document.getElementById('deleteLastName').value =
            button.getAttribute('data-lastname');

        document.getElementById('deleteAge').value =
            button.getAttribute('data-age');

        document.getElementById('deleteEmail').value =
            button.getAttribute('data-email');

        const rolesString = button.getAttribute('data-roles');
        document.getElementById('deleteRoles').value = rolesString ? rolesString : '';
    }
</script>
<script>
    document.addEventListener("DOMContentLoaded", function () {

        const hasError = /*[[${editError}]]*/ false;

        if (hasError) {
            const modal = new bootstrap.Modal(document.getElementById('editModal'));
            modal.show();
        }
    });
</script>


</body>
</html>
