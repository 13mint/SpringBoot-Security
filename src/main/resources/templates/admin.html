<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-text text-white">

            <b th:text="${#authentication.name}"></b>

            with roles:

            <span th:each="role : ${#authentication.authorities}"
                  th:text="${role.authority} + ' '">
            </span>

        </span>

        <form th:action="@{/logout}" method="post">

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>

            <button class="btn btn-outline-light">
                Logout
            </button>

        </form>

    </div>

</nav>


<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 bg-light vh-100 p-3">
            <ul class="nav flex-column">
                <li class="nav-item mb-2">
                    <a class="nav-link active"
                       th:href="@{/admin}">
                        Admin
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/user}">
                        User
                    </a>
                </li>
            </ul>
        </div>

        <div class="col-md-10 p-4">
            <h2>Admin panel</h2>
            <ul class="nav nav-tabs mb-4">
                <li class="nav-item">
                    <button class="nav-link active"
                            data-bs-toggle="tab"
                            data-bs-target="#usersTable">
                        Users table
                    </button>
                </li>

                <li class="nav-item">
                    <button class="nav-link"
                            data-bs-toggle="tab"
                            data-bs-target="#newUser">
                        New user
                    </button>
                </li>
            </ul>


            <div class="tab-content">
                <div class="tab-pane fade show active"
                     id="usersTable">
                    <table class="table table-striped">
                        <thead>
                        <tr>

                            <th>ID</th>
                            <th>Username</th>
                            <th>First name</th>
                            <th>Last name</th>
                            <th>Age</th>
                            <th>Email</th>
                            <th>Roles</th>
                            <th>Edit</th>
                            <th>Delete</th>

                        </tr>
                        </thead>
                        <tbody>

                        <tr th:each="user : ${users}">

                            <td th:text="${user.id}"></td>
                            <td th:text="${user.username}"></td>
                            <td th:text="${user.firstName}"></td>
                            <td th:text="${user.lastName}"></td>
                            <td th:text="${user.age}"></td>
                            <td th:text="${user.email}"></td>

                            <td>

                                <span th:each="role : ${user.roles}"
                                      th:text="${role.name} + ' '">
                                </span>

                            </td>

                            <td>

                                <a th:href="@{/admin/edit/{id}(id=${user.id})}"
                                   class="btn btn-warning btn-sm">
                                    Edit
                                </a>
                            </td>

                            <td>
                                <form th:action="@{/admin/delete/{id}(id=${user.id})}"
                                      method="post">
                                    <button class="btn btn-danger btn-sm">
                                        Delete
                                    </button>
                                </form>
                            </td>
                        </tr>

                        </tbody>

                    </table>

                </div>


                <div class="tab-pane fade" id="newUser">

                    <div class="container mt-4" style="max-width:500px">

                        <h4 class="text-center mb-4">Add User</h4>

                        <div th:if="${errorMessage}" class="alert alert-danger">
                            <p th:text="${errorMessage}"></p>
                        </div>

                        <form th:action="@{/admin/newUser}" th:object="${user}" method="post">

                            <input type="hidden" th:field="*{id}" />

                            <div class="mb-3">

                                <label class="form-label">Roles</label>

                                <div th:each="role : ${roles}" class="form-check">

                                    <label>
                                        <input class="form-check-input"
                                               type="checkbox"
                                               th:field="*{roles}"
                                               th:value="${role.id}">
                                    </label>

                                    <label class="form-check-label"
                                           th:text="${role.name}">
                                    </label>

                                </div>

                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('roles')}"
                                     th:errors="*{roles}">
                                </div>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">Username</label>

                                <label>
                                    <input type="text"
                                           class="form-control"
                                           th:field="*{username}"
                                           required>
                                </label>

                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('username')}"
                                     th:errors="*{username}">
                                </div>

                            </div>

                            <div class="mb-3">
                                <label class="form-label">First name</label>
                                <label>
                                    <input type="text"
                                           class="form-control"
                                           th:field="*{firstName}"
                                           required>
                                </label>

                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('firstName')}"
                                     th:errors="*{firstName}">
                                </div>

                            </div>

                            <div class="mb-3">
                                <label class="form-label">Last name</label>
                                <label>
                                    <input type="text"
                                           class="form-control"
                                           th:field="*{lastName}"
                                           required>
                                </label>

                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('lastName')}"
                                     th:errors="*{lastName}">
                                </div>

                            </div>

                            <div class="mb-3">
                                <label class="form-label">Age</label>

                                <label>
                                    <input type="number"
                                           class="form-control"
                                           th:field="*{age}"
                                           required>
                                </label>

                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('age')}"
                                     th:errors="*{age}">
                                </div>

                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <label>
                                    <input type="text"
                                           class="form-control"
                                           th:field="*{email}"
                                           required>
                                </label>
                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('email')}"
                                     th:errors="*{email}">
                                </div>

                            </div>

                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <label>
                                    <input type="password"
                                           class="form-control"
                                           th:field="*{password}"
                                           required>
                                </label>
                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('password')}"
                                     th:errors="*{password}">
                                </div>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit"
                                        class="btn btn-primary">
                                    Create user
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
